<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>open-car-reprog</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <div class="titlebar">
    <h1>open-car-reprog</h1>
    <span class="breadcrumb" id="breadcrumb"></span>
    <span class="spacer"></span>
    <button class="btn btn-sm" id="btn-home">⌂ Projets</button>
    <span class="version-badge" id="version-badge"></span>
  </div>

  <div id="view-container" style="flex:1;display:flex;overflow:hidden;"></div>

  <div class="status-bar" id="status-bar">
    <span>Prêt</span>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay hidden" id="modal-new-project">
  <div class="modal">
    <h2>Nouveau projet</h2>
    <label>Nom du projet *</label>
    <input type="text" id="np-name" placeholder="ex: 206 HDI 110cv Stage 1">
    <label>Véhicule (marque / modèle)</label>
    <input type="text" id="np-vehicle" placeholder="ex: Peugeot 206 1.6 HDi 110cv">
    <label>Immatriculation</label>
    <input type="text" id="np-immat" placeholder="ex: AB-123-CD" style="text-transform:uppercase">
    <label>Année</label>
    <input type="text" id="np-year" placeholder="ex: 2004">
    <label>ECU / Calculateur</label>
    <select id="np-ecu">
      <option value="edc16c34">EDC16C34 (PSA 1.6 HDi)</option>
    </select>
    <label>Description (optionnel)</label>
    <input type="text" id="np-desc" placeholder="ex: Dépollution FAP + stage 1">
    <div class="modal-actions">
      <button class="btn" id="np-cancel">Annuler</button>
      <button class="btn btn-primary" id="np-create">Créer</button>
    </div>
  </div>
</div>

<!-- Edit Project Modal -->
<div class="modal-overlay hidden" id="modal-edit-project">
  <div class="modal">
    <h2>Modifier le projet</h2>
    <label>Nom du projet *</label>
    <input type="text" id="ep-name" placeholder="ex: 206 HDI 110cv Stage 1">
    <label>Véhicule (marque / modèle)</label>
    <input type="text" id="ep-vehicle" placeholder="ex: Peugeot 206 1.6 HDi 110cv">
    <label>Immatriculation</label>
    <input type="text" id="ep-immat" placeholder="ex: AB-123-CD" style="text-transform:uppercase">
    <label>Année</label>
    <input type="text" id="ep-year" placeholder="ex: 2004">
    <label>ECU / Calculateur</label>
    <select id="ep-ecu"></select>
    <label>Description</label>
    <input type="text" id="ep-desc" placeholder="ex: Dépollution FAP + stage 1">
    <label>Base adresses affichage (hex)</label>
    <input type="text" id="ep-addr-base" placeholder="0x00000 — laissez vide si les adresses A2L matchent directement le fichier ROM">
    <div class="modal-actions">
      <button class="btn" id="ep-cancel">Annuler</button>
      <button class="btn btn-primary" id="ep-save">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Commit Modal -->
<div class="modal-overlay hidden" id="modal-commit">
  <div class="modal">
    <h2>Sauvegarder les modifications</h2>
    <label>Message de commit</label>
    <input type="text" id="commit-msg" placeholder="ex: FAP OFF - adresse 1E9DD4">
    <div class="modal-actions">
      <button class="btn" id="commit-cancel">Annuler</button>
      <button class="btn btn-success" id="commit-confirm">💾 Commit</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
</html>
